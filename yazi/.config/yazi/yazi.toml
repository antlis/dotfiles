# Default yazi config - video/music opens with mpv

[opener]
edit = [
	{ run = '${EDITOR:-vi} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
	{ run = 'xdg-open "$1"', desc = "Open", for = "linux" },
]
play = [
	{ run = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
	# Folder
	{ name = "*/", use = ["open"] },
	# Text
	{ mime = "text/*", use = ["edit"] },
	# Image
	{ mime = "image/*", use = ["open"] },
	# Media - opens with mpv
	{ mime = "{audio,video}/*", use = ["play"] },
	# Fallback
	{ name = "*", use = ["open"] },
]
